    - data:
        desc: ''
        instruction: '现在我在创建专家授课协议你的任务是参数提取

          如果用户输入李华医生，则姓名只提取李华，不要职业后缀


          信息如果不存在不要提取

          注意：

          1. 医生的角色包括主持人、主席、专家咨询会顾问、讲者、评论嘉宾，不属于以上的话给空不要随意给值，只有完全匹配才给值，不要发散

          2. 地址输入格式为XX省XX市XX区+详细地址，用户输入地址相关则提取，不要自己修改！！！

          3. 只要是XX教授、XX医生、XX专家都要提取出姓名，只要出现人名就要提取出姓名

          不要对原始输入有修改，用户输入什么提取什么，不要发散

          4. 创建专家授课协议是这个功能，不是活动

          5. 仅当用户明确表达授课时长时才提取 teachDuration；不要把“授课时间：2026年3月1日至3月2日”提取为 teachDuration。'
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: DeepSeek-V3.1-Aliyun
