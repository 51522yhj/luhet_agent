          \ = first_item.get(\"planInfo\",{})\n        activityId = first_item.get(\"\
          activityId\",\"\")\n        planInfoStr = first_item.get(\"planInfoStr\"\
          ,\"\")\n        basicInfo = first_item.get(\"basicInfo\",{})\n        \n\
          \        return {\n            \"namebj\": namebj,\n            \"locationbj\"\
          : locationbj,\n            \"activitybj\": activitybj,\n            \"phoneList\"\
          : phoneList,\n            \"bankAccount\": bankAccount,\n\n            \"\
          suppliers\": suppliers,\n            \"signer\": signer,\n            \"\
          userId\": userId,\n            \"departName\": departName,\n           \
          \ \"departCode\": departCode,\n            \"userName\": userName,\n   \
