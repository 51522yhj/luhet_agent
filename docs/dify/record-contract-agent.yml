          \        \"planInfoStr\": planInfoStr,\n        \"signerStr\": json.dumps(signer,\
          \ ensure_ascii=False),\n        \"userName\": quote(userName),\n       \
          \ \"departName\": quote(departName),\n        \"result_dict\": [result_dict],\n\
