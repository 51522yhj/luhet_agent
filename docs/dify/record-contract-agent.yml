    - data:
        code: "function main({list}) {\n    // 确保list是数组\n    const supplierList =\
          \ Array.isArray(list) ? list : [];\n    \n    // 如果没有数据，返回空数组\n    if (supplierList.length\
          \ === 0) {\n        return {\n            singleSelectHTML: \"\"\n     \
          \   };\n    }\n    \n    // 转换供应商信息为角色选项\n    const roleOptions = supplierList.map((supplier,\
          \ index) => {\n        // 从供应商信息中提取关键字段\n        const companyName = supplier.companyName\
          \ || \"\";\n        \n        // 构建显示文本\n        let displayText = companyName;\n\
          \        \n        return {\n            id: index + 1,  // 从1开始的ID\n  \
          \          mergeValue: displayText,\n            selectItemIndex: index,\
          \  // 重要：Dify需要这个字段\n            // 保留原始数据\n            originalData: {\n\
          \                companyName: supplier.companyName,\n                companyCode:\
          \ supplier.companyCode,\n                supplierCode: supplier.supplierCode\n\
          \            }\n        };\n    });\n    \n    // Dify单选组件的正确格式\n    const\
          \ options = {\n        title: \"请选择甲方名称\",\n        list: roleOptions,\n\
          \        msg_type: \"name_selection\"\n    };\n    \n    const singleSelectHTML\
          \ = `<block data-type=\"singleSelect\" data-options='${JSON.stringify(options)}'></block>`;\n\
          \    \n    return {\n        singleSelectHTML: singleSelectHTML\n    };\n\
          }"
