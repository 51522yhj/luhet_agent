          \ basicInfo: dict, offer: float, suppliers: dict, bankAccount: list, phoneList:\
          \ dict, teachCity: list[str], planInfoStr: str, signer: dict, userName:\
          \ str, departName: str, signerId: str) -> dict:\n    # 创建一个集合，包含两个参数\n \
          \   times = {beginTime, endTime}\n    teachTime = [beginTime, endTime]\n\
          \    \n    # 将数字转换为字符串\n    offer_str = str(offer)\n    # for account in\
          \ bankAccount:\n    #     if isinstance(account, dict):\n    #         #\
          \ 保存原来的值\n    #         account_name = account.get(\"accountName\", \"\"\
          )\n    #         account_number = account.get(\"accountNumber\", \"\")\n\
          \            \n            \n    #         # 修改字段值\n    #         # depositBankName改为accountName的值\n\
          \    #         account[\"depositBankName\"] = account_name\n    #      \
          \   # accountName改为accountNumber的值\n    #         account[\"accountName\"\
          ] = account_number\n  \n   \n    # 获取今天的日期，格式为年月日（如20251204）\n    today_date\
          \ = datetime.now().strftime(\"%Y%m%d\")\n    \n    # 构造合同名称：授课服务协议+今天日期\n\
          \    contract_name = f\"授课服务协议{today_date}\"\n    \n    # 更新字典中的值（确保为字符串类型）\n\
          \    expertSignInfoDTO[\"amount\"] = offer\n    expertSignInfoDTO[\"amountCNY\"\
          ] = offer\n    basicInfo[\"amountCNY\"] = offer_str\n    basicInfo[\"amount\"\
          ] = offer_str\n    basicInfo[\"contractName\"] = contract_name\n    suppliers[\"\
          amount\"] = offer\n    suppliers[\"amountCNY\"] = offer\n    suppliers[\"\
          bankAccount\"] = bankAccount\n    suppliers[\"phoneList\"] = phoneList\n\
          \    suppliers[\"expertSignInfoDTO\"] = expertSignInfoDTO\n    suppliers[\"\
          signType\"] = 2\n    suppliers[\"signCategory\"] = 3\n    suppliers[\"payChannelType\"\
          ] = 1\n    suppliers[\"signOrder\"] = 2\n    suppliers[\"supplyType\"] =\
          \ 2\n    suppliers[\"payPart\"] = 2\n    suppliers[\"signMode\"] = 0\n \
          \   supplierList = [suppliers]\n    signer[\"signerId\"] = signerId\n  \
          \  supplier_id_card = suppliers.get(\"supplierIdCard\",\"\")\n    \n   \
          \ # 创建arg1的副本或直接修改\n    # 方法1: 创建新字典，避免修改原始参数\n    result_dict = expertSignInfoDTO.copy()\n\
          \n    expertLevelName = suppliers[\"expertLevelName\"]\n    flag = 1 if\
          \ not expertLevelName and offer > 800 else 0\n\n    # 添加supplierIdCard到arg1中\n\
          \    result_dict[\"agentCardNo\"] = supplier_id_card\n    return {\n   \
          \     \"times\": list(times),\n        \"expertSignInfoDTO\": expertSignInfoDTO,\n\
          \        \"basicInfo\": basicInfo,\n        \"suppliers\": suppliers,\n\
          \        \"supplierList\": json.dumps(supplierList, ensure_ascii=False),\n\
