          ,{})\n        signer = first_item.get(\"signer\",{})\n\n        userId =\
          \ first_item.get(\"userId\",\"\")\n\n        departName = first_item.get(\"\
          departName\",\"\")\n        departCode = first_item.get(\"departCode\",\"\
          \")\n        userName = first_item.get(\"userName\",\"\")\n        cityName\
