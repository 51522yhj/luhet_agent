    - data:
        answer: '选专家时系统将对其身份证件和医生资格证进行校验，如有问题需要返回CRM系统修改后才能使用。

          当专家级别为空时，默认限制为：主席/主持人/专家咨询会顾问/讲者≤800元，评论嘉宾≤500元，超过限额无法提交合同。

          当专家级别不为空时，如果超额（超出既定级别费用的超额），可以继续提交，但系统将触发升级审批流程。当审批人点击【同意】时，将弹出超额风险提示框。

          提交时系统会判断每位专家，在本年度内（每年1月1日至12月31日），是否累计份数＞40份 或 累计协议金额＞10万（包含正在提交的协议），其中一项超过限度，将触发提醒。填写【超限原因】后方可提交，将触发升级审批流程（增加事业部总审批，事业部总后增加合规经理审批）。审批人界面会有【风险】提示，点击【同意】会跳出风险提示详情。

          一月内训会场数检查：协议中所有专家，如果同一专家同一个自然月参加内训会大于4场，核决流上升至事业部总决。'
